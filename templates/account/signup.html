{% extends 'blog/base.html' %}

{% block title %}Sign Up — ParaguayPath{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <h1 class="text-3xl font-bold text-forest mb-8">Create an account</h1>

    <form method="POST" class="flex flex-col gap-4">
        {% csrf_token %}
        {% for field in form %}
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">
                {{ field.label }}
            </label>
            <input type="{{ field.field.widget.input_type }}"
                   name="{{ field.html_name }}"
                   id="{{ field.id_for_label }}"
                   {% if field.value %}value="{{ field.value }}"{% endif %}
                   class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:border-forest">
            {% if field.errors %}
            <p class="text-red-500 text-sm mt-1">{{ field.errors|join:", " }}</p>
            {% endif %}
        </div>
        {% endfor %}

        <button type="submit"
                class="bg-forest text-white px-6 py-2 rounded-lg hover:bg-gold transition-colors mt-2">
            Sign Up
        </button>
    </form>

    <p class="text-gray-500 text-sm mt-6">
        Already have an account?
        <a href="{% url 'account_login' %}" class="text-gold hover:underline">Log in</a>
    </p>
</div>
{% endblock %}
