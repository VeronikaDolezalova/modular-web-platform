{% extends 'blog/base.html' %}

{% block title %}Log Out — ParaguayPath{% endblock %}

{% block content %}
<div class="max-w-md mx-auto text-center">
    <h1 class="text-3xl font-bold text-forest mb-4">Log out</h1>
    <p class="text-gray-600 mb-8">Are you sure you want to log out?</p>

    <form method="POST">
        {% csrf_token %}
        <button type="submit"
                class="bg-forest text-white px-8 py-2 rounded-lg hover:bg-gold transition-colors">
            Log out
        </button>
    </form>

    <p class="text-gray-500 text-sm mt-6">
        <a href="{% url 'blog:article_list' %}" class="text-gold hover:underline">
            Back to Blog
        </a>
    </p>
</div>
{% endblock %}
